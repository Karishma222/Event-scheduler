<!DOCTYPE html>
<html>
<head>

<title>Resources</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Resources</h2>

<form method="post">

<input type="text" name="name" placeholder="Resource name" class="form-control mb-2">

<select name="type" class="form-control mb-2">

<option>room</option>
<option>instructor</option>
<option>equipment</option>

</select>

<button class="btn btn-primary">Add Resource</button>

</form>

<hr>

<table class="table">

<tr>
<th>ID</th>
<th>Name</th>
<th>Type</th>
</tr>

{% for r in resources %}

<tr>
<td>{{r.id}}</td>
<td>{{r.name}}</td>
<td>{{r.type}}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
