<!DOCTYPE html>
<html>
<head>

<title>Utilisation Report</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">Resource Utilisation Report</h2>

<table class="table table-bordered">

<tr>
<th>Event</th>
<th>Resource</th>
<th>Start Time</th>
<th>End Time</th>
</tr>

{% for r in data %}

<tr>

<td>{{r.event}}</td>
<td>{{r.resource}}</td>
<td>{{r.start}}</td>
<td>{{r.end}}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
